<!DOCTYPE html>
<html>
<head>
    <title>AGRISMART AI</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #2e7d32, #81c784);
            color: white;
            text-align: center;
        }

        .login-box {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            margin: 100px auto;
        }

        .container { display: none; }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: green;
            color: white;
        }

        .box {
            background: white;
            color: black;
            margin: 15px;
            padding: 20px;
            border-radius: 15px;
        }

        img {
            width: 100px;
            border-radius: 50%;
        }
    </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginPage" class="login-box">

    <img src="logo.png">
    <h2>AGRISMART AI</h2>

    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>
    <p id="error" style="color:red;"></p>
</div>

<!-- 🌐 MAIN -->
<div id="mainPage" class="container">

<h1>🌱 AGRISMART AI SYSTEM</h1>

<!-- 🎤 VOICE -->
<div class="box">
    <h2>🎤 Voice Assistant (Telugu + English)</h2>
    <button onclick="startListening()">🎙️ Speak</button>
    <p id="voiceText"></p>
</div>

<!-- 💧 IRRIGATION -->
<div class="box">
    <h2>💧 Smart Irrigation</h2>
    <select id="soil">
        <option value="dry">Dry</option>
        <option value="moist">Moist</option>
        <option value="wet">Wet</option>
        <option value="very dry">Very Dry</option>
        <option value="rainy">Rainy</option>
    </select>
    <button onclick="checkWater()">Check</button>
    <p id="waterResult"></p>
</div>

<!-- 🌾 SOIL -->
<div class="box">
    <h2>🌾 Crop Recommendation</h2>
    <input id="soilType" placeholder="black / red / alluvial">
    <button onclick="recommendCrop()">Suggest</button>
    <p id="cropResult"></p>
</div>

<!-- 📷 DISEASE -->
<div class="box">
    <h2>📷 AI Disease Detection</h2>
    <input type="file" id="imageInput"><br>
    <img id="preview" style="display:none;">
    <button onclick="detectDisease()">Detect</button>
    <p id="diseaseResult"></p>
</div>

<!-- 🧑‍🌾 MARKET -->
<div class="box">
    <h2>🧑‍🌾 Farmer Market</h2>
    <input id="name" placeholder="Name"><br>
    <input id="crop" placeholder="Crop"><br>
    <input id="price" placeholder="Price"><br>
    <button onclick="addMarket()">Add</button>
    <p id="marketList"></p>
</div>

<!-- 🌦️ WEATHER -->
<div class="box">
    <h2>🌦️ Smart Weather System</h2>
    <button onclick="getWeather()">Get Weather</button>
    <p id="weather"></p>
</div>

</div>

<script>
// LOGIN
function login(){
    if(username.value=="Harika" && password.value=="1234"){
        loginPage.style.display="none";
        mainPage.style.display="block";
    } else {
        error.innerText="Invalid Login";
    }
}

// 🎤 VOICE (TELUGU + ENGLISH FIXED)
function startListening(){
    const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)();
    rec.lang="en-IN";
    rec.start();

    rec.onresult=e=>{
        let text=e.results[0][0].transcript.toLowerCase();
        voiceText.innerText="You said: "+text;
        respond(text);
    };
}

function respond(cmd){
    let isTelugu=/[\u0C00-\u0C7F]/.test(cmd);
    let res="";

    if(cmd.includes("నీరు")||cmd.includes("water"))
        res=isTelugu?"నీరు సరైన సమయంలో ఇవ్వాలి":"Water crops properly";
    else if(cmd.includes("పంట")||cmd.includes("crop"))
        res=isTelugu?"పంట ఎంపిక మట్టి పై ఆధారపడి ఉంటుంది":"Crop depends on soil type";
    else if(cmd.includes("వ్యాధి")||cmd.includes("disease"))
        res=isTelugu?"ఫోటో అప్లోడ్ చేసి వ్యాధి తెలుసుకోండి":"Upload image for disease detection";
    else if(cmd.includes("వాతావరణం")||cmd.includes("weather"))
        res=isTelugu?"వాతావరణ వివరాలు ఇక్కడ ఉన్నాయి":"Weather info is shown here";
    else if(cmd.includes("హలో")||cmd.includes("hello"))
        res=isTelugu?"నమస్కారం!":"Hello! Welcome";
    else
        res=isTelugu?"అర్థం కాలేదు":"Not understood";

    speak(res);
}

function speak(msg){
    let m=new SpeechSynthesisUtterance(msg);
    m.lang=/[\u0C00-\u0C7F]/.test(msg)?"te-IN":"en-IN";
    speechSynthesis.speak(m);
}

// IRRIGATION
function checkWater(){
    let s=soil.value;
    waterResult.innerText=
        s=="dry"?"💧 Water needed":
        s=="moist"?"⚠️ Light watering":
        s=="wet"?"✅ No water":
        s=="very dry"?"🚨 Urgent irrigation":
        "🌧️ OFF";
}

// SOIL
function recommendCrop(){
    let s=soilType.value.toLowerCase();
    cropResult.innerText=
        s=="black"?"Cotton":
        s=="red"?"Groundnut":
        s=="alluvial"?"Rice":
        "General crops";
}

// DISEASE
imageInput.onchange=e=>{
    preview.src=URL.createObjectURL(e.target.files[0]);
    preview.style.display="block";
};
function detectDisease(){
    let d=["Healthy","Leaf Spot","Fungal"];
    diseaseResult.innerText="AI Result: "+d[Math.floor(Math.random()*d.length)];
}

// MARKET
let data=[];
function addMarket(){
    data.push(name.value+" selling "+crop.value+" ₹"+price.value);
    marketList.innerHTML=data.join("<br>");
}

// WEATHER
function getWeather(){
    let temp=Math.floor(Math.random()*10)+28;
    let humidity=Math.floor(Math.random()*50)+40;
    let wind=Math.floor(Math.random()*15)+5;

    let cond=["Sunny ☀️","Cloudy ☁️","Rainy 🌧️"];
    let c=cond[Math.floor(Math.random()*cond.length)];

    let sug=c.includes("Rainy")?"No irrigation":
             temp>35?"Increase watering":
             "Normal weather";

    weather.innerHTML=
        "Temp: "+temp+"°C<br>"+
        "Condition: "+c+"<br>"+
        "Humidity: "+humidity+"%<br>"+
        "Wind: "+wind+" km/h<br><br>"+sug;
}
</script>

</body>
</html>
